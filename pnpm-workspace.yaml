packages:
  - "apps/buildx-builder/*"
  - "apps/primitives/*"
  - "packages/*"

onlyBuiltDependencies:
  - sharp
  - esbuild
overrides:
  axios: ">=1.15.2"
  defu: ">=6.1.5"
  devalue: ">=5.8.1"
  lodash-es: ">=4.18.0"
  picomatch@2: 2.3.2
  vite: 7.3.3
patchedDependencies:
  # For docs if/when added
  starlight-site-graph@0.5.0: patches/starlight-site-graph@0.5.0.patch
  # Fix the click to open until next version fix is in.
  "@tanstack/devtools@0.12.2": patches/@tanstack__devtools@0.12.2.patch
peerDependencyRules:
  allowedVersions:
    # Compatibility waivers for apps/uniremit/web-app.
    eslint-plugin-solid>eslint: "10.0.0"
    tsconfck>typescript: "6.0.3"
    # When Payload CMS lands, keep any peer waivers scoped to Payload packages
    # using pnpm's parent>peer selector, for example:
    # '@payloadcms/next>next': "16.x"
    # '@payloadcms/richtext-lexical>react': "19.x"
publicHoistPattern:
  - rollup
  - "@rollup/*"
  - "@tailwindcss/*"
  # oxlint jsPlugins referenced by @impress/oxlint-config are resolved relative
  # to the linted package, so hoist them to the workspace root for all consumers.
  - eslint-plugin-*

# Keep peer drift visible in CI; use scoped allowedVersions entries for
# reviewed compatibility gaps instead of disabling strict peer checks globally.
strictPeerDependencies: true
